services:
  mongo:
    image: mongo:7
    container_name: cnm-fashion-mongo-prod
    restart: unless-stopped
    volumes:
      - mongo-data-prod:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      target: prod
    container_name: cnm-fashion-server-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/eshop
      - NODE_ENV=production
      - CLIENT_URL=${CLIENT_URL}
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
      target: prod
      args:
        - VITE_API_URL=/api
    container_name: cnm-fashion-client-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data-prod:
    driver: local
