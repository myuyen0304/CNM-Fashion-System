services:
  mongo:
    image: mongo:7
    container_name: cnm-fashion-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    profiles:
      - local-db
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'try { rs.status().ok } catch (e) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongo:27017\"}]}); rs.status().ok }' | mongosh --quiet | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      target: dev
    container_name: cnm-fashion-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - server/.env
    environment:
      - CLIENT_URL=http://localhost:5173
      - MONGO_URI=mongodb://mongo:27017/eshop?replicaSet=rs0
      - NODE_ENV=development
      - TZ=Asia/Ho_Chi_Minh
      - VNPAY_TIMEZONE=Asia/Ho_Chi_Minh
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
      target: dev
    container_name: cnm-fashion-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - ./client/vite.config.js:/app/vite.config.js
      - ./client/tailwind.config.js:/app/tailwind.config.js
      - ./client/postcss.config.js:/app/postcss.config.js
      - /app/node_modules
    depends_on:
      - server

volumes:
  mongo-data:
    driver: local
